# Committed example. Copy to config.yaml (gitignored) and set the referenced env vars.
# Secrets are NEVER stored here — each *_env value names an environment variable that
# load_config resolves from os.environ at boot (unset/empty -> boot fails fast).
api_key_env: "GATEWAY_API_KEY"   # gateway's own static bearer key
db_path: "gateway.db"
cooldown_seconds: 60          # seconds an unhealthy pool entry is skipped before one free retry
default_pool: "default"

providers:
  deepseek:
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    timeout_s: 30.0
  anthropic:
    base_url: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"
    timeout_s: 30.0

pools:
  cheap:
    - { provider: deepseek, model: deepseek-chat }
    - { provider: anthropic, model: claude-haiku-4-5 }
  default:
    - { provider: anthropic, model: claude-sonnet-5 }
  large-context:
    - { provider: anthropic, model: claude-sonnet-5 }

# Illustrative rates (NOT secrets, NOT authoritative) — verify against live provider
# pricing before production. cost_usd is computed at write time from provider usage.
prices:
  deepseek-chat:    { input_per_1m: 0.27, output_per_1m: 1.10 }
  claude-haiku-4-5: { input_per_1m: 1.00, output_per_1m: 5.00 }
  claude-sonnet-5:  { input_per_1m: 3.00, output_per_1m: 15.00 }

# Stage-1 deterministic rules, evaluated in order — first match wins.
# Token thresholds use a ~4-chars/token estimate (routing only, not billing).
rules:
  - name: explicit-hint            # caller forces a pool via the x-pool header
    when: { header: "x-pool" }
    pool: "{{ header.x-pool }}"
  - name: has-tools                # tool/function calling → capable default pool
    when: { has_tools: true }
    pool: default
  - name: long-context            # very long inputs → large-context pool
    when: { min_input_tokens: 20000 }
    pool: large-context
  - name: short-and-simple         # short, tool-less → cheap pool
    when: { max_input_tokens: 500, has_tools: false }
    pool: cheap

# Stage-2 classifier: consulted ONLY when no stage-1 rule matches. It runs a cheap
# model that returns exactly one label (a pool name); on timeout/error/garbage the
# request degrades to fallback_pool. A classifier failure never fails the request.
classifier:
  enabled: true
  pool: cheap              # the classifier itself runs on the cheap pool
  labels: [cheap, default] # allowed outputs; each must be a defined pool
  fallback_pool: default   # used on timeout / error / unparseable output
  timeout_s: 5.0           # hard timeout for the classifier call
  max_probe_chars: 2000    # truncate system prompt + last user message to this many chars each
  max_output_tokens: 8     # constrained output for the label

# Server-rendered dashboard. budget_usd is an optional monthly budget; leave it
# null to show spend without a budget line. baseline_model estimates what this
# month's recorded tokens would cost on one model using the static rates above.
dashboard:
  budget_usd: null
  baseline_model: claude-sonnet-5
  recent_request_limit: 50
  fallback_event_limit: 25
